<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonom Digital | Short Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d90429; --white: #ffffff; --dark: #2b2d42; --gray: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--gray); color: var(--dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        header { text-align: center; margin: 40px 0; }
        header h1 { color: var(--red); font-size: 2.5rem; font-weight: 700; }
        .container { width: 100%; max-width: 600px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        input:focus { border-color: var(--red); outline: none; }
        button { background: var(--red); color: white; border: none; padding: 15px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b00320; }
        #error-msg { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }
        #result-box { margin-top: 25px; padding: 20px; background: #fff5f5; border: 1px dashed var(--red); border-radius: 8px; display: none; text-align: center; }
        .short-url { color: var(--red); font-weight: 700; font-size: 1.2rem; display: block; margin-bottom: 10px; word-break: break-all; }
        .history { margin-top: 30px; width: 100%; max-width: 600px; }
        .history-item { background: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <h1>Jonom Digital</h1>
    <p>Fast & Free URL Shortener</p>
</header>

<div class="container">
    <div class="input-group">
        <input type="url" id="long-url" placeholder="Paste your long link here..." required>
        <button id="gen-btn">Generate Short Link</button>
    </div>
    <p id="error-msg">❌ Please enter a valid URL starting with http:// or https://</p>

    <div id="result-box">
        <span class="short-url" id="display-url"></span>
        <button onclick="copyLink()" style="padding: 8px 20px; font-size: 0.8rem; background: var(--dark);">Copy Link</button>
    </div>
</div>

<div class="history" id="history-section" style="display:none;">
    <h3 style="margin-bottom:10px; font-size: 1rem;">Recent Links</h3>
    <div id="history-list"></div>
</div>

<script>
    const genBtn = document.getElementById('gen-btn');
    const longUrlInput = document.getElementById('long-url');

    genBtn.addEventListener('click', async () => {
        const longUrl = longUrlInput.value.trim();
        
        if (!longUrl.startsWith('http')) {
            document.getElementById('error-msg').style.display = 'block';
            return;
        }
        document.getElementById('error-msg').style.display = 'none';
        genBtn.innerText = "Generating...";

        // Construct the bridge link to redirect.html
        const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const bridgeUrl = `${currentPath}redirect.html?target=${encodeURIComponent(longUrl)}`;

        try {
            // Use TinyURL to shorten our bridge URL
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(bridgeUrl)}`);
            const shortUrl = await response.text();
            
            showResult(shortUrl);
            saveHistory(shortUrl);
        } catch (err) {
            alert("Error: API limit reached or connection lost.");
        } finally {
            genBtn.innerText = "Generate Short Link";
        }
    });

    function showResult(url) {
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('display-url').innerText = url;
    }

    function copyLink() {
        const url = document.getElementById('display-url').innerText;
        navigator.clipboard.writeText(url);
        alert("Link copied to clipboard!");
    }

    function saveHistory(url) {
        let links = JSON.parse(localStorage.getItem('jonom_history')) || [];
        links.unshift(url);
        links = links.slice(0, 3);
        localStorage.setItem('jonom_history', JSON.stringify(links));
        displayHistory();
    }

    function displayHistory() {
        const links = JSON.parse(localStorage.getItem('jonom_history')) || [];
        if (links.length > 0) {
            document.getElementById('history-section').style.display = 'block';
            document.getElementById('history-list').innerHTML = links.map(link => 
                `<div class="history-item"><span>${link}</span></div>`
            ).join('');
        }
    }
    window.onload = displayHistory;
</script>
</body>
</html>
